  { q: "How often do you use AI at work today?", options: [
    { label: "Rarely", score: 0 }, { label: "Weekly", score: 1 }, { label: "Most days", score: 2 }, { label: "Constantly", score: 3 }] },
  { q: "How confident are your prompts?", options: [

];

/* ================= AQ ENGINE — the index IP, prototype formula ================= */
const capCountsFrom = (experiments) => {
  const counts = {};
  experiments.forEach(e => {
    const t = TASKS.find(x => x.id === e.taskId);
    if (t) t.caps.forEach(c => { counts[c] = (counts[c] || 0) + 1; });
  });
  return counts;
};

const aqScore = (calib, experiments) => {
  const counts = capCountsFrom(experiments);
  const covered = CAPS.filter(c => (counts[c.id] || 0) > 0).length;
  const kept = experiments.filter(e => e.decision === "keep").length;
  const rate = experiments.length ? kept / experiments.length : 0;
  let s = 12 + (calib || 0) * 4;                    // starting fluency: 12–36
  s += covered * 7;                                  // breadth: up to 49
  s += Math.min(10, experiments.length * 1.5);       // volume: up to 10
  if (experiments.length >= 3 && rate >= 0.5 && rate <= 0.85) s += 8;  // calibration bonus: keeps AND kills
  return Math.min(100, Math.round(s));
};
const aqLevel = (s) => s <= 25 ? "Novice" : s <= 50 ? "Explorer" : s <= 75 ? "Practitioner" : "Orchestrator";

/* ================= LOOP VISUAL ================= */
const LOOP_NODES = [{ id: "human", name: "Human", icon: "👤", color: "#6b7280" }, ...CAPS, { id: "tenx", name: "10x Human", icon: "✨", color: "#94c90d" }];

const LoopVisual = ({ experiments, hasSetup, compact }) => {
  const counts = capCountsFrom(experiments);
  const allCovered = CAPS.every(c => (counts[c.id] || 0) > 0);
  const isFilled = (n) => n.id === "human" ? !!hasSetup : n.id === "tenx" ? allCovered : (counts[n.id] || 0) > 0;
  const nextNode = LOOP_NODES.find(n => !isFilled(n));
  const W = 760, H = compact ? 185 : 245;
  const padX = 40, padY = compact ? 36 : 54;
  const points = LOOP_NODES.map((n, i) => {
    const t = i / (LOOP_NODES.length - 1);
    return { node: n, x: padX + t * (W - padX * 2), y: H - padY - (t * (H - padY * 2)) + Math.sin(t * Math.PI) * 14 };
  });
  const path = points.map((p, i) => (i === 0 ? `M ${p.x} ${p.y}` : `L ${p.x} ${p.y}`)).join(" ");
  const first = points[0], last = points[points.length - 1];
  const arc = `M ${last.x} ${last.y} C ${last.x + 10} ${-28}, ${first.x - 10} ${-28}, ${first.x} ${first.y}`;
  return (
    <div className="w-full overflow-x-auto">
      <svg viewBox={`0 -52 ${W} ${H + 52}`} className="w-full" style={{minHeight: compact ? 165 : 225}}>
        <path d={path} stroke="#dfe2da" strokeWidth="2.4" fill="none" />
        <path d={arc} className="arc-loop" stroke="#94c90d" strokeWidth="2.2" fill="none" />
        <polygon points={`${first.x-5},${first.y-12} ${first.x+5},${first.y-12} ${first.x},${first.y-2}`} fill="#94c90d"/>
        {points.map((p) => {
          const filled = isFilled(p.node);
          const active = nextNode && nextNode.id === p.node.id;
          const count = counts[p.node.id] || 0;
          return (
            <g key={p.node.id}>
              <circle cx={p.x} cy={p.y} r={active ? 20 : 16}
                fill={filled ? p.node.color : "#fff"} stroke={active ? "#94c90d" : (filled ? p.node.color : "#dfe2da")}
                strokeWidth={active ? 3 : 1.8} className={active ? "stage-active" : ""}/>
              <text x={p.x} y={p.y + 5} textAnchor="middle" fontSize="14">{p.node.icon}</text>
              {!compact && <text x={p.x} y={p.y + 34} textAnchor="middle" fontSize="10.5" fill="#141b4d" fontWeight={active ? 700 : 500}>{p.node.name}</text>}
              {!compact && count > 0 && p.node.id !== "human" && p.node.id !== "tenx" && <text x={p.x} y={p.y + 46} textAnchor="middle" fontSize="9" fill="#6b7280">×{count}</text>}
              {filled && p.node.id !== "human" && <circle cx={p.x + 12} cy={p.y - 12} r="5" fill="#53bc86" stroke="white" strokeWidth="1.5"/>}
            </g>
          );
        })}
        <text x={W/2} y={-28} textAnchor="middle" fontSize="11" fill="#6f9a06" fontWeight="700" letterSpacing="2" fontFamily="Poppins">
          {allCovered ? "LOOP CLOSED — CLIMB AGAIN, HIGHER" : "EVERY EXPERIMENT IS A TURN OF THE LOOP"}
        </text>
      </svg>
    </div>
  );
};

);

/* ================= SETUP ================= */
const Setup = ({ onComplete }) => {
  const [step, setStep] = useState(0); // 0 role, 1 tasks, 2 calibration, 3 name
  const [role, setRole] = useState(null);
  const [picked, setPicked] = useState([]);
  const [answers, setAnswers] = useState({});
  const [name, setName] = useState("");

  if (step === 0) {
    return (
      <div className="max-w-xl mx-auto px-6 py-12 fade-up">
        <p className="text-xs muted uppercase tracking-widest font-semibold head">Setup · 1 of 4</p>
        <h2 className="head text-3xl font-bold mt-2">What's your world?</h2>
        <p className="muted text-sm mt-2">We'll suggest the experiments that pay off fastest in your role.</p>
        <div className="flex flex-wrap gap-2 mt-7">
          {ROLES.map(r => (
            <button key={r} className={`chip ${role === r ? "active" : ""}`} onClick={() => { setRole(r); setTimeout(() => setStep(1), 220); }}>{r}</button>
          ))}
        </div>
      </div>
    );
  }

  if (step === 1) {
    const order = ROLE_PREFS[role] || ROLE_PREFS["Other"];
    const orderedTasks = order.map(id => TASKS.find(t => t.id === id)).filter(Boolean);
    const toggle = (id) => setPicked(p => p.includes(id) ? p.filter(x => x !== id) : [...p, id]);
    return (
      <div className="max-w-2xl mx-auto px-6 py-12 fade-up">
        <p className="text-xs muted uppercase tracking-widest font-semibold head">Setup · 2 of 4</p>
        <h2 className="head text-3xl font-bold mt-2">Which of these eat your week?</h2>
        <p className="muted text-sm mt-2">Ordered for <b>{role}</b>. Pick <b>3 or more</b> — these become your experiments.</p>
        <div className="grid sm:grid-cols-2 gap-3 mt-7">
          {orderedTasks.map(t => (
            <button key={t.id} className={`task-tile ${picked.includes(t.id) ? "active" : ""}`} onClick={() => toggle(t.id)}>
              <p className="text-2xl">{t.icon}</p>
              <p className="font-semibold text-sm head mt-1.5">{t.name}</p>
              <p className="text-xs muted mt-0.5">~{t.typicalMin} min/wk · save ~{t.estSave}</p>
            </button>
          ))}
        </div>
        <div className="flex justify-between mt-7">
          <button onClick={() => setStep(0)} className="btn-ghost">← Back</button>
          <button onClick={() => picked.length >= 3 && setStep(2)} className="btn-accent" disabled={picked.length < 3} style={{opacity: picked.length >= 3 ? 1 : 0.4}}>
            {picked.length < 3 ? `Pick ${3 - picked.length} more` : "Continue →"}
          </button>
        </div>
      </div>
    );
  }

  if (step === 2) {
    const done = CALIBRATION.every((q, i) => answers[i] != null);
    return (
      <div className="max-w-xl mx-auto px-6 py-12 fade-up">
        <p className="text-xs muted uppercase tracking-widest font-semibold head">Setup · 3 of 4</p>
        <h2 className="head text-3xl font-bold mt-2">Two questions, honest answers.</h2>
        <p className="muted text-sm mt-2">This sets your starting AQ — your Adoption Quotient. It only goes up from real work.</p>
        {CALIBRATION.map((q, qi) => (
          <div key={qi} className="mt-7">
            <p className="font-medium text-sm mb-3">{q.q}</p>
            <div className="flex flex-wrap gap-2">
              {q.options.map((o, oi) => (
                <button key={oi} className={`chip ${answers[qi] === oi ? "active" : ""}`} onClick={() => setAnswers(a => ({...a, [qi]: oi}))}>{o.label}</button>
              ))}
            </div>
          </div>
        ))}
        <div className="flex justify-between mt-9">
          <button onClick={() => setStep(1)} className="btn-ghost">← Back</button>
          <button onClick={() => done && setStep(3)} className="btn-accent" disabled={!done} style={{opacity: done ? 1 : 0.4}}>Continue →</button>
        </div>
      </div>
    );
  }

  const canGo = name.trim().length > 1;
  const calib = CALIBRATION.reduce((s, q, i) => s + (answers[i] != null ? q.options[answers[i]].score : 0), 0);
  const startingAQ = aqScore(calib, []);
  return (
    <div className="max-w-xl mx-auto px-6 py-12 fade-up">
      <p className="text-xs muted uppercase tracking-widest font-semibold head">Setup · 4 of 4</p>
      <h2 className="head text-3xl font-bold mt-2">Whose loop is this?</h2>
      <div className="mt-7">
        <p className="text-xs muted uppercase tracking-widest font-semibold head mb-2">Your name</p>
        <input type="text" placeholder="e.g. Aisha Verma" value={name} onChange={e => setName(e.target.value)} />
      </div>
      <div className="card p-5 mt-6 text-center" style={{background: "var(--accent-tint)"}}>
        <p className="text-xs muted uppercase tracking-widest font-semibold head">Your starting AQ</p>
        <p className="head font-bold mt-1" style={{fontSize: 42}}>{startingAQ}</p>
        <p className="text-xs muted">{aqLevel(startingAQ)} · climbs only through real experiments</p>
      </div>
      <div className="flex justify-between mt-9">
        <button onClick={() => setStep(2)} className="btn-ghost">← Back</button>
        <button onClick={() => canGo && onComplete({ role, picked, name: name.trim(), calib })}
          className="btn-accent" disabled={!canGo} style={{opacity: canGo ? 1 : 0.4}}>
          Start my first experiment →
        </button>
      </div>
    </div>
  );
};

/* ================= THIS WEEK ================= */
const Week = ({ user, picked, experiments, aq, aqDelta, onRun, setScreen }) => {
  const doneTaskIds = experiments.map(e => e.taskId);
  const order = ROLE_PREFS[(user && user.role) || "Other"] || ROLE_PREFS["Other"];
  const candidates = order.filter(id => picked.includes(id) && !doneTaskIds.includes(id));
  const fallback = order.filter(id => !doneTaskIds.includes(id));
  const nextTask = TASKS.find(t => t.id === (candidates[0] || fallback[0]));
  const kept = experiments.filter(e => e.decision === "keep");
  const weeklySaved = kept.reduce((s, e) => s + Math.max(0, e.baselineMin - e.aiMin), 0);
  const weekNo = experiments.length + 1;
  const hour = new Date().getHours();
  const greeting = hour < 12 ? "Good morning" : hour < 17 ? "Good afternoon" : "Good evening";
  const topRecipe = RECIPES.filter(r => !doneTaskIds.includes(r.taskId) && (!nextTask || r.taskId !== nextTask.id))[0];

  return (
    <div className="max-w-3xl mx-auto px-6 py-12 fade-up">
      {aqDelta && (
        <div className="aq-toast card p-4 mb-6 flex items-center justify-between gap-3 flex-wrap" style={{borderColor: "var(--accent)", background: "var(--accent-tint)"}}>
          <p className="text-sm"><b>AQ {aqDelta.from} → {aqDelta.to}</b>{aqDelta.to > aqDelta.from ? ` (+${aqDelta.to - aqDelta.from})` : ""} · {aqDelta.note}</p>
          <span className="text-xl">📈</span>
        </div>
      )}
      <p className="muted text-sm">{greeting}{user && user.name ? `, ${user.name.split(" ")[0]}` : ""}.</p>
      <h2 className="head text-4xl font-bold mt-1 tracking-tight">Turn {weekNo} of your loop</h2>
      <p className="muted text-sm mt-1">One experiment a week. Each one climbs the loop — and can become a recipe for your team.</p>

      {nextTask ? (
        <div className="card p-8 mt-7" style={{borderColor: "var(--accent)", borderWidth: 2}}>
          <div className="flex items-start gap-5">
            <div className="w-16 h-16 rounded-2xl flex items-center justify-center flex-shrink-0 text-3xl" style={{background: "var(--accent-tint)"}}>{nextTask.icon}</div>
            <div className="flex-1">
              <p className="text-xs muted uppercase tracking-widest font-semibold head">Picked for {(user && user.role) || "you"} · est. saving ~{nextTask.estSave} min/wk</p>
              <h3 className="head text-2xl font-bold mt-1">{nextTask.name}</h3>
              <p className="text-sm mt-2 leading-relaxed muted">{nextTask.why}</p>
            </div>
          </div>
          <button onClick={() => onRun(nextTask.id, null)} className="btn-accent mt-6 w-full text-center text-base">
            Run this experiment — next time you do this task →
          </button>
          <p className="text-xs muted text-center mt-3">No separate practice time. The task was going to happen anyway.</p>
        </div>
      ) : (
        <div className="card p-8 mt-7 text-center">
          <p className="text-4xl">🎉</p>
          <h3 className="head text-2xl font-bold mt-2">Every task tested. Check the Exchange for what teammates kept.</h3>
          <button onClick={() => setScreen("exchange")} className="btn-primary mt-5">Open the Exchange →</button>
        </div>
      )}

      {topRecipe && (
        <div className="card p-5 mt-4 flex items-center justify-between gap-4 flex-wrap" style={{background: "var(--blue-tint)", borderColor: "var(--blue)"}}>
          <div className="flex items-center gap-3">
            <span className="text-2xl">{(TASKS.find(t => t.id === topRecipe.taskId) || {}).icon}</span>
            <div>
              <p className="text-sm font-semibold head">Or adopt a teammate's recipe: {(TASKS.find(t => t.id === topRecipe.taskId) || {}).name}</p>
              <p className="text-xs muted">{topRecipe.by} keeps it · {topRecipe.adopters} adopters · ~{topRecipe.savePerWk} min/wk</p>
            </div>
          </div>
          <button onClick={() => onRun(topRecipe.taskId, topRecipe.by)} className="btn-primary text-sm" style={{padding: "9px 16px"}}>Adopt →</button>
        </div>
      )}

      <div className="grid grid-cols-4 gap-3 mt-6">
        <div className="card p-4 text-center">
          <p className="head text-2xl font-bold" style={{color: "var(--accent-dark)"}}>{aq}</p>
          <p className="text-xs muted mt-1">AQ · {aqLevel(aq)}</p>
        </div>
        <div className="card p-4 text-center">
          <p className="head text-2xl font-bold">{weeklySaved > 0 ? `${Math.round(weeklySaved / 60 * 10) / 10}h` : "0h"}</p>
          <p className="text-xs muted mt-1">banked / week</p>
        </div>
        <div className="card p-4 text-center">
          <p className="head text-2xl font-bold">{experiments.length}</p>
          <p className="text-xs muted mt-1">experiments</p>
        </div>
        <div className="card p-4 text-center">
          <p className="head text-2xl font-bold">{kept.length}</p>
          <p className="text-xs muted mt-1">recipes kept</p>
        </div>
      </div>

      <div className="card p-5 mt-6">
        <LoopVisual experiments={experiments} hasSetup={!!user} compact />
      </div>
    </div>
  );
};

/* ================= RUN ================= */
const Run = ({ task, user, adoptedFrom, onSave, onBack }) => {
  const [baseline, setBaseline] = useState(null);
  const [aiTime, setAiTime] = useState(null);
  const [decision, setDecision] = useState(null);
  const [signals, setSignals] = useState([]);
  const [note, setNote] = useState("");
  const [copied, setCopied] = useState(false);
  const toggleSignal = (id) => setSignals(s => s.includes(id) ? s.filter(x => x !== id) : [...s, id]);
  const copyPrompt = () => { navigator.clipboard && navigator.clipboard.writeText(task.prompt).then(() => { setCopied(true); setTimeout(() => setCopied(false), 1600); }); };
  const canFinish = baseline != null && aiTime != null && decision != null;
  const saved = canFinish && aiTime !== 999 ? Math.max(0, baseline - aiTime) : 0;

  return (
    <div className="max-w-2xl mx-auto px-6 py-10 fade-up">
      <button onClick={onBack} className="text-sm muted hover:ink">← This week</button>
      <div className="mt-5 flex items-center gap-4">
        <div className="w-14 h-14 rounded-2xl flex items-center justify-center text-2xl" style={{background: "var(--accent-tint)"}}>{task.icon}</div>
        <div>
          <h2 className="head text-3xl font-bold">{task.name}</h2>
          <p className="muted text-sm">{adoptedFrom ? `Adopted from ${adoptedFrom}'s recipe` : "Experiment · on your real task"}</p>
        </div>
      </div>
      {adoptedFrom && (
        <div className="mt-4 px-4 py-3 rounded-xl text-sm" style={{background: "var(--blue-tint)"}}>
          👥 <b>{adoptedFrom}</b> keeps this workflow. You're testing whether it works for <i>you</i> — keep or kill on your own evidence.
        </div>
      )}

      <div className="mt-9">
        <p className="pill mb-3" style={{background: "var(--blue-tint)", color: "var(--blue)"}}>1 · The old way</p>
        <p className="text-[15px] font-medium mb-3">How long does this usually take you, per week?</p>
        <div className="flex flex-wrap gap-2">
          {TIME_OPTS.map(([label, min]) => (
            <button key={min} className={`chip ${baseline === min ? "active" : ""}`} onClick={() => setBaseline(min)}>{label}</button>
          ))}
        </div>
      </div>

      <div className="mt-9">
        <p className="pill mb-3" style={{background: "var(--mint-tint)", color: "#2e8a5e"}}>2 · The new way — do the task now</p>
        <div className="space-y-2 mb-4">
          {task.recipe.map((r, i) => (
            <p key={i} className="flex gap-2 text-[15px]"><b className="head" style={{color: "var(--accent-dark)"}}>{i+1}.</b><span>{r}</span></p>
          ))}
        </div>
        <div className="card p-4" style={{background: "#f7f8f4"}}>
          <p className="text-sm font-mono leading-relaxed whitespace-pre-wrap">{task.prompt}</p>
        </div>
        <div className="flex gap-2 mt-3 flex-wrap">
          <a href={runUrl("claude", task.prompt, user && user.role)} target="_blank" rel="noopener" className="btn-primary text-sm" style={{padding: "10px 18px", textDecoration: "none"}}>Run in Claude →</a>
          <a href={runUrl("chatgpt", task.prompt, user && user.role)} target="_blank" rel="noopener" className="btn-ghost text-sm" style={{padding: "10px 18px", textDecoration: "none"}}>Run in ChatGPT →</a>
          <button onClick={copyPrompt} className="btn-ghost text-sm" style={{padding: "10px 18px"}}>{copied ? "✓ Copied" : "Copy prompt"}</button>
        </div>
        <p className="text-xs mt-3 px-3 py-2 rounded-lg" style={{background: "var(--warn-tint)"}}>⚠️ <b>Watch out:</b> {task.watch}</p>
      </div>

      <div className="mt-9">
        <p className="pill mb-3" style={{background: "#f3eefa", color: "#7b6baf"}}>3 · The verdict — 20 seconds</p>
        <p className="text-[15px] font-medium mb-3">How long did it take with AI?</p>
        <div className="flex flex-wrap gap-2 mb-6">
          {AI_TIME_OPTS.map(([label, min]) => (
            <button key={min} className={`chip ${aiTime === min ? "active" : ""}`} onClick={() => setAiTime(min)}>{label}</button>
          ))}
        </div>
        <p className="text-[15px] font-medium mb-3">Keep this workflow, or kill it?</p>
        <div className="flex gap-3 mb-6">
          <button onClick={() => setDecision("keep")} className="flex-1 p-4 rounded-xl border-2 text-center transition"
            style={{borderColor: decision === "keep" ? "var(--accent)" : "var(--line)", background: decision === "keep" ? "var(--accent-tint)" : "white"}}>
            <p className="text-2xl">✅</p><p className="head font-bold text-sm mt-1">Keep it</p><p className="text-xs muted">becomes a recipe your team can adopt</p>
          </button>

            style={{borderColor: decision === "kill" ? "var(--warn)" : "var(--line)", background: decision === "kill" ? "var(--warn-tint)" : "white"}}>

            <button key={s.id} className={`chip text-xs ${signals.includes(s.id) ? "active" : ""}`} onClick={() => toggleSignal(s.id)}>{s.label}</button>

        <textarea rows="2" placeholder="One line for your teammates — what's the trick, or the trap?" value={note} onChange={e => setNote(e.target.value)} />

      {canFinish && (
        <div className="card p-5 mt-7 fade-up" style={{background: decision === "keep" ? "var(--accent-tint)" : "var(--warn-tint)", borderColor: decision === "keep" ? "var(--accent)" : "var(--warn)"}}>
          <p className="head text-lg font-bold">
            {decision === "keep"
              ? (aiTime === 999 ? "Kept — worth it despite the time, for now." : `Kept — ~${saved} min banked weekly, and it's now a recipe in your team's Exchange.`)
              : "Killed — you just saved every teammate from the same dead end. That's a contribution."}
          </p>
        </div>
      )}

      <div className="mt-7 flex items-center justify-between flex-wrap gap-3 pb-6">
        <p className="text-xs muted">{canFinish ? "Done — log it." : "Fill the three steps above to log this experiment."}</p>
        <div className="flex gap-3">
          <button onClick={onBack} className="btn-ghost">Exit without logging</button>
          <button onClick={() => canFinish && onSave({ taskId: task.id, baselineMin: baseline, aiMin: aiTime === 999 ? baseline + 15 : aiTime, decision, signals, note, adoptedFrom: adoptedFrom || null, at: new Date().toISOString() })}
            className="btn-accent" disabled={!canFinish} style={{opacity: canFinish ? 1 : 0.4}}>
            Log experiment ✓
          </button>
        </div>
      </div>
    </div>
  );
};

/* ================= EXCHANGE — the viral engine ================= */

  const myKept = experiments.filter(e => e.decision === "keep");
  const myKilled = experiments.filter(e => e.decision === "kill");
  const totalTeamSave = RECIPES.reduce((s, r) => s + r.adopters * r.savePerWk, 0);
  return (
    <div className="max-w-3xl mx-auto px-6 py-10 fade-up">
      <h2 className="head text-4xl font-bold tracking-tight">The Exchange</h2>
      <p className="muted mt-1">Workflows your teammates proved on real work. Adopt in one click — keep or kill on your own evidence.</p>

      <div className="card p-6 mt-7 text-white" style={{background: "var(--ink)"}}>
        <div className="grid grid-cols-3 gap-4 text-center">
          <div><p className="head font-bold" style={{fontSize: 34, color: "var(--accent)"}}>{RECIPES.length + myKept.length}</p><p className="text-xs opacity-80 mt-1">proven recipes</p></div>
          <div><p className="head font-bold" style={{fontSize: 34}}>{RECIPES.reduce((s, r) => s + r.adopters, 0)}</p><p className="text-xs opacity-80 mt-1">adoptions</p></div>
          <div><p className="head font-bold" style={{fontSize: 34}}>{Math.round(totalTeamSave / 60)}h</p><p className="text-xs opacity-80 mt-1">saved per week, team-wide</p></div>
        </div>

      </div>

      {myKept.length > 0 && (
        <div className="card p-6 mt-6" style={{borderColor: "var(--accent)"}}>
          <p className="text-xs muted uppercase tracking-widest font-semibold head mb-3">Your recipes — live in the Exchange</p>
          <div className="space-y-2">
            {myKept.map((e, i) => {

      <div className="mt-6 space-y-3">

          const t = TASKS.find(x => x.id === r.taskId);
          const alreadyRun = experiments.some(e => e.taskId === r.taskId);

                <div className="flex justify-between items-start gap-3 flex-wrap">
                  <div>
                    <p className="font-semibold text-sm head">{t ? t.name : r.taskId}</p>
                    <p className="text-xs muted mt-0.5">{r.by} · {r.role}</p>
                  </div>
                  <div className="text-right">
                    <p className="text-xs font-bold" style={{color: "var(--accent-dark)"}}>~{r.savePerWk} min/wk</p>
                    <p className="text-xs muted">{r.adopters} adopters</p>
                  </div>
                </div>
                <p className="text-sm italic mt-2 muted">"{r.quote}"</p>
                <div className="mt-3">
                  {alreadyRun
                    ? <span className="text-xs muted">✓ You've already run this task</span>
                    : <button onClick={() => onAdopt(r.taskId, r.by)} className="btn-primary text-xs" style={{padding: "8px 16px"}}>Adopt this workflow →</button>}

            </div>

      {myKilled.length > 0 && (

          <p className="text-xs muted uppercase tracking-widest font-semibold head mb-2">Dead ends you've flagged (equally valuable)</p>
          {myKilled.map((e, i) => {
            const t = TASKS.find(x => x.id === e.taskId);
            return <p key={i} className="text-sm">🗑️ <b>{t ? t.name : e.taskId}</b>{e.note ? ` — "${e.note}"` : ""} <span className="muted">· saves teammates the same detour</span></p>;
          })}
        </div>
      )}

};

/* ================= LEDGER ================= */
const Ledger = ({ user, experiments, aq, onRerun }) => {
  const kept = experiments.filter(e => e.decision === "keep");
  const weeklySaved = kept.reduce((s, e) => s + Math.max(0, e.baselineMin - e.aiMin), 0);
  const yearly = Math.round(weeklySaved * 46 / 60);
  const counts = capCountsFrom(experiments);
  const untouched = CAPS.filter(c => !(counts[c.id] > 0));
  const suggestion = untouched.length > 0
    ? TASKS.find(t => t.caps.some(c => untouched.map(u => u.id).includes(c)) && !experiments.some(e => e.taskId === t.id))
    : null;
  const exportJSON = () => {
    const blob = new Blob([JSON.stringify({ user, experiments, aq, exportedAt: new Date().toISOString() }, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = `loop-v3-ledger-${((user && user.name) || "anon").replace(/\s+/g, "_")}.json`; a.click();
  };

  return (

        <LoopVisual experiments={experiments} hasSetup={!!user} />

      <div className="flex justify-center mt-6">
        <button onClick={exportJSON} className="btn-ghost text-sm">Export my data (JSON)</button>
      </div>
    </div>
  );
};

/* ================= FEEDBACK ================= */
const FeedbackButton = ({ onClick }) => (
  <button onClick={onClick} className="fixed bottom-6 right-6 z-50 text-white rounded-full px-4 py-3 shadow-lg text-sm font-semibold head hover:scale-105 transition-transform" style={{background: "#141b4d"}}>
    💬 Note to Anuj
  </button>
);

const FeedbackModal = ({ user, currentScreen, onSave, onClose }) => {
  const [note, setNote] = useState("");
  const [sentiment, setSentiment] = useState(null);
  const [sent, setSent] = useState(false);
  const submit = () => {
    if (note.trim().length < 3) return;
    onSave({ note, sentiment, screen: currentScreen, user: (user && user.name) || "Anonymous", timestamp: new Date().toISOString() });
    setSent(true); setTimeout(onClose, 1400);
  };
  const mailto = () => {
    window.location.href = `mailto:${CONFIG.feedbackEmail}?subject=${encodeURIComponent(`[10x Loop v3] ${(user && user.name) || "Reviewer"} · ${currentScreen}`)}&body=${encodeURIComponent(`Screen: ${currentScreen}\nSentiment: ${sentiment || "—"}\n\n${note}`)}`;
  };
  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal fade-up" onClick={e => e.stopPropagation()}>
        {sent ? (
          <div className="text-center py-6"><p className="text-5xl">✅</p><p className="head text-2xl font-bold mt-3">Saved.</p></div>
        ) : (
          <div>
            <h2 className="head text-2xl font-bold">What stood out — or didn't?</h2>
            <p className="muted text-xs mt-1">v3 north star · screen: <b>{currentScreen}</b></p>
            <div className="flex gap-2 mt-4 flex-wrap">
              {[["love", "💚 Loved it"], ["meh", "🤔 Meh"], ["confusing", "😕 Confusing"], ["prev", "↩️ v1/v2 did this better"]].map(([k, v]) => (
                <button key={k} className={`chip text-xs ${sentiment === k ? "active" : ""}`} onClick={() => setSentiment(k)}>{v}</button>
              ))}
            </div>
            <textarea rows="4" className="mt-4" placeholder="Compare across versions freely — that's the point." value={note} onChange={e => setNote(e.target.value)} />
            <div className="flex gap-2 mt-5 justify-end flex-wrap">
              <button onClick={onClose} className="btn-ghost text-sm">Cancel</button>
              <button onClick={mailto} className="btn-ghost text-sm" disabled={note.length < 3} style={{opacity: note.length >= 3 ? 1 : 0.4}}>Email it</button>
              <button onClick={submit} className="btn-accent text-sm" disabled={note.length < 3} style={{opacity: note.length >= 3 ? 1 : 0.4}}>Save →</button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
};

/* ================= APP ================= */
const App = () => {
  const [screen, setScreen] = useState("welcome");
  const [user, setUser] = useState(null);
  const [picked, setPicked] = useState([]);
  const [experiments, setExperiments] = useState([]);
  const [feedbacks, setFeedbacks] = useState([]);
  const [runningTask, setRunningTask] = useState(null);
  const [adoptedFrom, setAdoptedFrom] = useState(null);
  const [aqDelta, setAqDelta] = useState(null);
  const [showFeedback, setShowFeedback] = useState(false);
  const [hydrated, setHydrated] = useState(false);

  useEffect(() => {
    let s = null;
    try { const raw = localStorage.getItem(STORAGE_KEY); if (raw) s = JSON.parse(raw); } catch (e) {}
    if (s) {
      if (s.user) setUser(s.user);
      if (s.picked) setPicked(s.picked);
      if (s.experiments) setExperiments(s.experiments);
      if (s.feedbacks) setFeedbacks(s.feedbacks);
      if (s.user) setScreen("week");
    }
    setHydrated(true);
  }, []);

  useEffect(() => {
    if (!hydrated) return;
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify({ user, picked, experiments, feedbacks })); } catch (e) {}
  }, [hydrated, user, picked, experiments, feedbacks]);

  const aq = aqScore(user ? user.calib : 0, experiments);

  const seed = () => {
    const daysAgo = (n) => { const d = new Date(); d.setDate(d.getDate() - n); return d.toISOString(); };
    setUser({ name: "Aisha Verma", role: "Marketing", calib: 4 });
    setPicked(["status", "minutes", "deck", "research", "sheet"]);
    setExperiments([
      { taskId: "status", baselineMin: 60, aiMin: 15, decision: "keep", signals: ["faster", "trust"], note: "Bullets on my commute, AI assembles, I edit 5 min.", adoptedFrom: null, at: daysAgo(21) },
      { taskId: "minutes", baselineMin: 30, aiMin: 8, decision: "keep", signals: ["faster", "better"], note: "", adoptedFrom: "Rohan M.", at: daysAgo(14) },
      { taskId: "research", baselineMin: 90, aiMin: 70, decision: "kill", signals: ["unsure", "redid"], note: "Facts were stale — verification took longer than researching myself.", adoptedFrom: null, at: daysAgo(7) },
      { taskId: "sheet", baselineMin: 60, aiMin: 20, decision: "keep", signals: ["faster"], note: "Spot-check five rows. Always.", adoptedFrom: "Dev P.", at: daysAgo(2) }
    ]);
    setScreen("week");
  };

  const resetSession = () => {
    if (!confirm("Clear all v3 data and start fresh?")) return;
    localStorage.removeItem(STORAGE_KEY);
    window.location.href = window.location.pathname;
  };

  const startRun = (taskId, from) => { setRunningTask(taskId); setAdoptedFrom(from || null); setScreen("run"); };

  const task = TASKS.find(t => t.id === runningTask);
  if (!hydrated) return <div/>;

  return (
    <div className="min-h-screen flex flex-col">
      <div className="brand-strip"/>
      {screen !== "welcome" && screen !== "setup" && (
        <Header screen={screen} setScreen={setScreen} userName={user && user.name} onReset={resetSession} />
      )}
      <div className="flex-1">
        {screen === "welcome" && <Welcome onStart={() => setScreen("setup")} onSeed={seed} />}
        {screen === "setup" && <Setup onComplete={(v) => { setUser({ name: v.name, role: v.role, calib: v.calib }); setPicked(v.picked); setScreen("week"); }} />}
        {screen === "week" && user && (
          <Week user={user} picked={picked} experiments={experiments} aq={aq} aqDelta={aqDelta}
            onRun={startRun} setScreen={setScreen} />
        )}
        {screen === "week" && !user && <Welcome onStart={() => setScreen("setup")} onSeed={seed} />}
        {screen === "run" && task && (
          <Run task={task} user={user} adoptedFrom={adoptedFrom}
            onSave={(exp) => {
              const before = aq;
              const after = aqScore(user ? user.calib : 0, [...experiments, exp]);
              setExperiments(e => [...e, exp]);
              setAqDelta({ from: before, to: after, note: exp.decision === "keep" ? "workflow kept — it's in your Exchange now" : "dead end flagged — calibration counts too" });
              setRunningTask(null); setAdoptedFrom(null); setScreen("week");
            }}
            onBack={() => { setRunningTask(null); setAdoptedFrom(null); setScreen("week"); }} />
        )}
        {screen === "exchange" && <Exchange user={user} experiments={experiments} onAdopt={startRun} />}
        {screen === "ledger" && <Ledger user={user} experiments={experiments} aq={aq} onRerun={(id) => startRun(id, null)} />}
        {screen === "org" && <Org />}
      </div>

      {screen !== "welcome" && screen !== "setup" && <ConceptNotes />}
      {screen !== "welcome" && screen !== "setup" && <FeedbackButton onClick={() => setShowFeedback(true)} />}
      {showFeedback && (
        <FeedbackModal user={user} currentScreen={screen} onSave={(p) => setFeedbacks(f => [...f, p])} onClose={() => setShowFeedback(false)} />
      )}

      <footer className="text-xs muted text-center py-8 border-t mt-6" style={{borderColor: "var(--line)"}}>
        <p>10x Loop · Compounding Loop concept v3 · an AI&amp;Beyond exploration · <a href="../" className="underline">v1</a> · <a href="../v2/" className="underline">v2</a></p>
      </footer>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
