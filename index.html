/* ========================= ARTIFACT EVAL ========================= */
const evaluateArtifact = (text) => {
  const trimmed = text.trim();
  const wordCount = trimmed.split(/\s+/).filter(Boolean).length;
  if (wordCount < 5) return null;
  const checks = {
    hasContext: wordCount > 30,
    hasAudience: /\bfor\b[^.]{0,40}(reader|leader|customer|manager|exec|cfo|ceo|board|team|client|user|audience|stakeholder|director|head of|chief|investor|recruiter)/i.test(text),
    hasConstraint: /(no more than|less than|under|maximum|exactly|at least|within|in \d+|fewer than|in under|no longer than|max \d|max\.?)/i.test(text),
    hasFormat: /(bullet|paragraph|list|table|slide|deck|email|format|structure|outline|headline|tweet|markdown|json|schema)/i.test(text),
    hasIntent: /(i want|i'd like|so that|in order to|the goal is|the output should|so we can|the reader should|so they|to (approve|decide|act|reply|forward))/i.test(text),
    hasVoice: /(tone|voice|sound|formal|casual|direct|warm|professional|friendly|like a |concise|punchy|crisp)/i.test(text),
    hasNegative: /(don'?t|do not|avoid|no fluff|no corporate|skip the|without|don't use)/i.test(text),
    hasExample: /(for example|e\.?g\.?|like (this|so)|here's (an example|a sample)|example:)/i.test(text)
  };
  let score = 3.5;
  if (checks.hasContext) score += 1;
  if (checks.hasAudience) score += 1.5;
  if (checks.hasConstraint) score += 1.5;
  if (checks.hasFormat) score += 1;
  if (checks.hasIntent) score += 1;
  if (checks.hasVoice) score += 0.5;
  if (checks.hasNegative) score += 0.5;
  if (checks.hasExample) score += 0.5;
  if (wordCount > 220) score -= 0.5;
  if (wordCount < 15) score -= 1.5;
  score = Math.max(1, Math.min(10, score));
  const strengths = [], lifts = [];
  if (checks.hasAudience) strengths.push("You named the audience — the biggest tone lever.");
  else lifts.push("Name the audience. 'For a CFO with 60 seconds' lands differently from 'for a leader.'");
  if (checks.hasConstraint) strengths.push("You set a constraint. That's spec-mindset — exactly right.");
  else lifts.push("Set a constraint. 'Under 80 words' or 'in 5 bullets.' AI defaults to long without one.");
  if (checks.hasFormat) strengths.push("You specified the format. Saves an iteration round.");
  else lifts.push("Specify the format. Bullets, table, email, slide — removes ambiguity.");
  if (checks.hasIntent) strengths.push("You stated what should happen next. Outcome-driven beats content-driven.");
  else lifts.push("State the desired action. 'I want them to approve this' reframes the whole response.");
  if (checks.hasNegative) strengths.push("You told it what NOT to do. Underused and powerful.");
  if (checks.hasExample) strengths.push("You showed an example. Gold for tone matching.");
  if (wordCount < 15) lifts.unshift("Too short to be a spec. Aim for 40–100 well-chosen words.");
  if (wordCount > 220) lifts.unshift("This is long. Most prompts peak at 50–150 words.");
  return { score: Math.round(score * 10) / 10, strengths: strengths.slice(0, 4), lifts: lifts.slice(0, 3), wordCount };
};

const LoopVisual = ({ progress, currentStage, onSelect, compact }) => {
  const W = 760, H = compact ? 190 : 250;
  const padX = 40, padY = compact ? 38 : 56;
  const points = STAGES.map((s, i) => {
    const t = i / (STAGES.length - 1);
    const x = padX + t * (W - padX * 2);
    const y = H - padY - (t * (H - padY * 2)) + Math.sin(t * Math.PI) * 14;
    return { ...s, x, y };
  });
  const path = points.map((p, i) => (i === 0 ? `M ${p.x} ${p.y}` : `L ${p.x} ${p.y}`)).join(" ");
  const first = points[0], last = points[points.length - 1];
  const arc = `M ${last.x} ${last.y} C ${last.x + 10} ${-28}, ${first.x - 10} ${-28}, ${first.x} ${first.y}`;
  return (
    <div className="w-full overflow-x-auto">
      <svg viewBox={`0 -55 ${W} ${H + 55}`} className="w-full" style={{minHeight: compact ? 170 : 230}}>
        <path d={path} stroke="#dfe2da" strokeWidth="2.4" fill="none" />
        <path d={arc} className="arc-loop" stroke="#94c90d" strokeWidth="2.2" fill="none" />
        <polygon points={`${first.x-5},${first.y-12} ${first.x+5},${first.y-12} ${first.x},${first.y-2}`} fill="#94c90d"/>
        {points.map((p) => {
          const done = !!(progress[p.id] && progress[p.id].completed);
          const active = currentStage === p.id;
          return (
            <g key={p.id} onClick={() => onSelect && onSelect(p.id)} style={{cursor: onSelect ? "pointer" : "default"}}>
              <circle cx={p.x} cy={p.y} r={active ? 21 : 17}
                fill={done ? p.color : "#fff"} stroke={active ? "#94c90d" : (done ? p.color : "#dfe2da")}
                strokeWidth={active ? 3 : 1.8} className={active ? "stage-active" : ""}/>
              <text x={p.x} y={p.y + 5} textAnchor="middle" fontSize="15">{p.icon}</text>
              {!compact && <text x={p.x} y={p.y + 36} textAnchor="middle" fontSize="11" fill="#141b4d" fontWeight={active ? 700 : 500}>{p.name}</text>}
              {done && <circle cx={p.x + 13} cy={p.y - 13} r="5.5" fill="#53bc86" stroke="white" strokeWidth="1.5"/>}
            </g>
          );
        })}
        <text x={W/2} y={-30} textAnchor="middle" fontSize="11" fill="#6f9a06" fontWeight="700" letterSpacing="2" fontFamily="Poppins">THE LOOP CONTINUES</text>
      </svg>
    </div>
  );
};

/* ========================= SETUP (single flow) ========================= */
const Setup = ({ onComplete }) => {
  const [step, setStep] = useState(0); // 0..3 questions, 4 = about you, 5 = result
  const [answers, setAnswers] = useState({});
  const [name, setName] = useState("");
  const [role, setRole] = useState("");
  const [goal, setGoal] = useState("");
  const [when, setWhen] = useState("");
  const total = ASSESSMENT.length + 1;

  const SUGGESTED_GOALS = [
    "Halve my email triage time",
    "Ship a weekly client digest in 30 min",
    "Automate my weekly status report",
    "Pre-brief every meeting in 5 min",
    "Build an AI assistant for my team"
  ];
  const WHEN_OPTIONS = ["Morning, with coffee", "Right after lunch", "Late afternoon", "Evening wind-down"];

  const score = () => {
    let s = 0;
    ASSESSMENT.forEach((q, i) => {
      const a = answers[i];
      if (q.type === "single" && a != null) s += q.options[a].score;
      if (q.type === "multi" && Array.isArray(a)) a.forEach(idx => s += q.options[idx].score);
    });
    return Math.min(100, Math.round(s));
  };

  if (step === ASSESSMENT.length) {
    const canGo = name.trim().length > 1 && goal.trim().length > 5;
    return (
      <div className="max-w-xl mx-auto px-6 py-12 fade-up">
        <div className="progress-bar mb-8"><div className="progress-fill" style={{width: `${(step/total)*100}%`}}/></div>
        <h2 className="head text-3xl font-bold leading-tight">Last step: anchor it to your work.</h2>
        <p className="muted text-sm mt-2">Every practice session ties back to this. Specific beats noble.</p>
        <div className="mt-7 space-y-5">
          <div>
            <p className="text-xs muted uppercase tracking-widest font-semibold head mb-2">Your name</p>
            <input type="text" placeholder="e.g. Aisha Verma" value={name} onChange={e => setName(e.target.value)} />
          </div>
          <div>
            <p className="text-xs muted uppercase tracking-widest font-semibold head mb-2">Your role <span className="normal-case font-normal">(optional)</span></p>
            <input type="text" placeholder="e.g. Senior Marketing Manager" value={role} onChange={e => setRole(e.target.value)} />
          </div>
          <div>
            <p className="text-xs muted uppercase tracking-widest font-semibold head mb-2">One work outcome you want AI to change</p>
            <div className="flex flex-wrap gap-2 mb-3">
              {SUGGESTED_GOALS.map(g => (
                <button key={g} className={`chip ${goal === g ? "active" : ""}`} onClick={() => setGoal(g)}>{g}</button>
              ))}
            </div>
            <textarea rows="2" placeholder="…or write your own. The more specific, the better." value={goal} onChange={e => setGoal(e.target.value)} />
          </div>
          <div>
            <p className="text-xs muted uppercase tracking-widest font-semibold head mb-2">When will you usually practise? <span className="normal-case font-normal">(optional)</span></p>
            <div className="flex flex-wrap gap-2">
              {WHEN_OPTIONS.map(w => (
                <button key={w} className={`chip ${when === w ? "active" : ""}`} onClick={() => setWhen(w)}>{w}</button>
              ))}
            </div>
          </div>
        </div>
        <div className="flex justify-between mt-9">
          <button onClick={() => setStep(s => s - 1)} className="btn-ghost">← Back</button>
          <button onClick={() => canGo && onComplete({ score: score(), name: name.trim(), role: role.trim(), goal: goal.trim(), when })}
            className="btn-accent" disabled={!canGo} style={{opacity: canGo ? 1 : 0.4}}>
            Finish setup →
          </button>
        </div>
      </div>
    );
  }

  const q = ASSESSMENT[step];
  const answered = q.type === "single" ? answers[step] != null : (answers[step] && answers[step].length > 0);
  return (
    <div className="max-w-xl mx-auto px-6 py-12 fade-up" key={step}>
      <div className="progress-bar mb-8"><div className="progress-fill" style={{width: `${(step/total)*100}%`}}/></div>
      <p className="text-xs muted uppercase tracking-widest font-semibold head">Question {step+1} of {ASSESSMENT.length}</p>
      <h2 className="head text-2xl font-bold mt-2 leading-snug">{q.q}</h2>
      <div className="space-y-3 mt-6">
        {q.options.map((opt, oi) => {
          const selected = q.type === "single" ? answers[step] === oi : (answers[step] || []).includes(oi);
          return (
            <button key={oi}
              onClick={() => {
                if (q.type === "single") {
                  setAnswers(a => ({...a, [step]: oi}));
                  setTimeout(() => setStep(s => s + 1), 250);
                } else {
                  setAnswers(a => {
                    const arr = a[step] || [];
                    return { ...a, [step]: arr.includes(oi) ? arr.filter(x => x !== oi) : [...arr, oi] };
                  });
                }
              }}
              className={`w-full text-left p-4 rounded-xl border-2 transition text-sm ${selected ? "bg-[#f3f9e2]" : "hover:border-[#4198d3]"}`}
              style={{borderColor: selected ? "var(--accent)" : "var(--line)"}}>
              {opt.label}
            </button>
          );
        })}
      </div>
      <div className="flex justify-between mt-8">
        <button onClick={() => setStep(s => Math.max(0, s - 1))} className="btn-ghost" disabled={step === 0} style={{opacity: step === 0 ? 0.4 : 1}}>← Back</button>
        {q.type === "multi" && (
          <button onClick={() => answered && setStep(s => s + 1)} className="btn-primary" disabled={!answered} style={{opacity: answered ? 1 : 0.5}}>Continue →</button>
        )}
      </div>
    </div>
  );
};

        <div className="card p-4 text-center h-full">
          <p className="head text-2xl font-bold">{done}<span className="text-sm muted">/9</span></p>
          <p className="text-xs muted mt-1">stages complete</p>

        <div className="card p-4 text-center h-full">
          <p className="head text-2xl font-bold">{levelObj ? levelObj.name : "—"}</p>

      {when && (
        <p className="text-xs muted text-center mt-5">Your usual practice window: <b>{when}</b></p>
      )}

      <button onClick={onSeeJourney} className="block mx-auto mt-8 text-sm muted hover:ink underline underline-offset-4">

      </button>

  );

/* ========================= PRACTICE (linear flow) ========================= */
const Practice = ({ stage, goal, savedData, savedEval, onSave, onSaveEval, onComplete, onBack, log }) => {
  const [practiceNote, setPracticeNote] = useState(savedData && savedData.practiceNote || "");
  const [reflection, setReflection] = useState(savedData && savedData.reflection || "");
  const [evalText, setEvalText] = useState(savedEval && savedEval.text || "");
  const [evalResult, setEvalResult] = useState(savedEval && savedEval.result || null);
  const [copied, setCopied] = useState(false);

  useEffect(() => { onSave({ practiceNote, reflection }); }, [practiceNote, reflection]);

  const runEval = () => {
    const ev = evaluateArtifact(evalText);
    setEvalResult(ev);
    if (ev) { onSaveEval({ text: evalText, result: ev, evaluatedAt: new Date().toISOString() }); log("eval_run", `${stage.id}: ${ev.score}/10`); }
  };
  const copyPrompt = () => {
    navigator.clipboard && navigator.clipboard.writeText(stage.prompt).then(() => { setCopied(true); setTimeout(() => setCopied(false), 1600); });
  };
  const canComplete = practiceNote.length > 8 || reflection.length > 8 || !!evalResult;
  const evalWords = evalText.trim().split(/\s+/).filter(Boolean).length;

  return (
    <div className="max-w-2xl mx-auto px-6 py-10 fade-up">
      <button onClick={onBack} className="text-sm muted hover:ink">← Today</button>

      <div className="mt-5 flex items-center gap-4">
        <div className="w-14 h-14 rounded-2xl flex items-center justify-center" style={{background: stage.color + "1a"}}>
          <span className="text-2xl">{stage.icon}</span>
        </div>
        <div>
          <h2 className="head text-3xl font-bold">{stage.name}</h2>
          <p className="muted text-sm">{stage.short} · ~{stage.minutes} min</p>
        </div>
      </div>

      {goal && (
        <div className="mt-5 px-4 py-3 rounded-xl text-sm" style={{background: "var(--accent-tint)", border: "1px solid var(--accent)"}}>
          🎯 <b>Do this for:</b> {goal}
        </div>
      )}

      {/* 1 · LEARN */}
      <div className="mt-8">
        <p className="pill mb-3" style={{background: "var(--blue-tint)", color: "var(--blue)"}}>1 · Understand — 2 min</p>
        <p className="text-[15px] leading-relaxed">{stage.learn}</p>
      </div>

      {/* 2 · DO */}
      <div className="mt-9">
        <p className="pill mb-3" style={{background: "var(--mint-tint)", color: "#2e8a5e"}}>2 · Do — {stage.minutes - 7} min</p>
        <p className="text-[15px] leading-relaxed mb-4">{stage.practice}</p>
        <div className="card p-4" style={{background: "#f7f8f4"}}>
          <div className="flex items-start justify-between gap-3">
            <p className="text-sm font-mono leading-relaxed flex-1">{stage.prompt}</p>
            <button onClick={copyPrompt} className="text-xs btn-ghost flex-shrink-0" style={{padding: "6px 12px"}}>{copied ? "✓ Copied" : "Copy"}</button>
          </div>
        </div>
        <p className="text-xs muted uppercase tracking-widest font-semibold head mt-5 mb-2">What did you do? (2–3 lines)</p>
        <textarea rows="3" placeholder="What task did you pick, what did you ask AI, what did you keep or change?"
          value={practiceNote} onChange={e => setPracticeNote(e.target.value)} />

        <div className="mt-6 p-5 rounded-2xl" style={{border: "1.5px dashed var(--blue)"}}>
          <p className="text-sm font-semibold head">Optional: get your work scored</p>
          <p className="text-xs muted mt-1 mb-3">Paste the actual prompt you wrote (or AI's output). You'll get an instant score and the one lift that matters most.</p>
          <textarea rows="4" placeholder="Paste your real prompt or AI output here…" value={evalText} onChange={e => setEvalText(e.target.value)} />
          <div className="flex gap-2 mt-3 flex-wrap">
            <button onClick={runEval} className="btn-primary text-sm" disabled={evalWords < 5} style={{opacity: evalWords >= 5 ? 1 : 0.4, padding: "10px 18px"}}>⚡ Score it</button>
            {evalText.trim().length > 10 && (
              <a href={claudeDeepEvalUrl(evalText, stage.name, goal)} target="_blank" rel="noopener" className="btn-ghost text-sm" style={{padding: "10px 18px"}}>🧠 Deep eval in Claude →</a>
            )}
          </div>
          {evalResult && (
            <div className="mt-4 fade-up">
              <div className="flex items-baseline gap-3">
                <p className="head text-4xl font-bold" style={{color: evalResult.score >= 7 ? "var(--accent-dark)" : evalResult.score >= 5 ? "var(--blue)" : "var(--warn)"}}>{evalResult.score}<span className="text-base muted font-normal">/10</span></p>
                <p className="text-xs muted">{evalResult.wordCount} words · heuristic score</p>
              </div>
              {evalResult.strengths.length > 0 && (
                <ul className="text-sm mt-3 space-y-1.5">
                  {evalResult.strengths.map((s, i) => <li key={i} className="flex gap-2"><span style={{color: "var(--mint)"}}>✓</span><span>{s}</span></li>)}
                </ul>
              )}
              {evalResult.lifts.length > 0 && (
                <div className="mt-3 px-4 py-3 rounded-xl text-sm" style={{background: "#fdf3ef"}}>
                  <b>Biggest lift:</b> {evalResult.lifts[0]}
                </div>
              )}
            </div>
          )}
        </div>
      </div>

      {/* 3 · REFLECT */}
      <div className="mt-9">
        <p className="pill mb-3" style={{background: "#f3eefa", color: "#7b6baf"}}>3 · Reflect — 2 min</p>
        <p className="text-[15px] leading-relaxed mb-3 font-medium">{stage.reflect}</p>
        <textarea rows="3" placeholder="A few honest lines. This shapes your capability more than the practice does."
          value={reflection} onChange={e => setReflection(e.target.value)} />
      </div>

      <div className="mt-9 flex items-center justify-between flex-wrap gap-3 pb-6">
        <p className="text-xs muted">{canComplete ? "Nice — you can finish this stage now." : "Fill in at least one box above to finish."}</p>
        <div className="flex gap-3">
          <button onClick={onBack} className="btn-ghost">Save &amp; exit</button>
          {!(savedData && savedData.completed) && (
            <button onClick={onComplete} className="btn-accent" disabled={!canComplete} style={{opacity: canComplete ? 1 : 0.4}}>
              Finish stage ✓
            </button>
          )}
        </div>
      </div>
    </div>
  );
};

/* ========================= JOURNEY ========================= */
const Journey = ({ progress, currentStage, onPick, score, level, goal, activity }) => {
  const done = STAGES.filter(s => progress[s.id] && progress[s.id].completed).length;
  const left = STAGES.length - done;
  const levelObj = LEVELS.find(l => l.id === level);
  const activeDays = [...new Set((activity || []).map(a => a.t.slice(0, 10)))].length;

  return (
    <div className="max-w-4xl mx-auto px-6 py-10 fade-up">
      <h2 className="head text-4xl font-bold tracking-tight">My journey</h2>
      {goal && <p className="muted mt-2">Working toward: <b className="ink">{goal}</b></p>}

      <div className="card p-6 mt-7">
        <LoopVisual progress={progress} currentStage={currentStage} onSelect={onPick} />
        <Nudge kind="gradient" outline={false}>
          <p className="text-center text-sm muted mt-2">{left === 0 ? "Loop complete — start again, higher." : `${left} stage${left === 1 ? "" : "s"} to complete the loop.`}</p>
        </Nudge>
      </div>

      <div className="grid md:grid-cols-3 gap-4 mt-6">
        <KPI label="Baseline score" value={score != null ? `${score}/100` : "—"} sub={levelObj ? levelObj.name : ""} />
        <KPI label="Stages complete" value={`${done}/9`} sub={`${Math.round((done/9)*100)}% of the loop`} />
        <KPI label="Days active" value={activeDays} sub="real sessions, this device" />
      </div>

      <div className="grid md:grid-cols-3 gap-3 mt-6">
        {STAGES.map(s => {
          const d = progress[s.id] && progress[s.id].completed;
          const active = currentStage === s.id;
          return (
            <button key={s.id} onClick={() => onPick(s.id)}
              className="card p-4 text-left transition hover:shadow-md"
              style={{borderColor: active ? "var(--accent)" : d ? s.color + "66" : "var(--line)", borderWidth: active ? 2 : 1}}>
              <div className="flex items-center gap-3">
                <div className="w-9 h-9 rounded-xl flex items-center justify-center flex-shrink-0" style={{background: d ? s.color : s.color + "1a"}}>
                  <span className="text-base">{s.icon}</span>
                </div>
                <div>
                  <p className="font-semibold text-sm head">{s.name} {d && <span style={{color: "var(--mint)"}}>✓</span>}{active && !d && <span className="text-xs ml-1" style={{color: "var(--accent-dark)"}}>← now</span>}</p>
                  <p className="text-xs muted">{s.short}</p>
                </div>
              </div>
            </button>
          );
        })}
      </div>
    </div>
  );
};

const FeedbackButton = ({ onClick }) => (

const FeedbackModal = ({ user, currentScreen, currentStage, onSave, onClose }) => {
  const [note, setNote] = useState("");
  const [sentiment, setSentiment] = useState(null);
  const [sent, setSent] = useState(false);
  const submit = () => {
    if (note.trim().length < 3) return;
    onSave({ note, sentiment, screen: currentScreen, stage: currentStage || "", user: user && user.name || "Anonymous", timestamp: new Date().toISOString() });
    setSent(true);
    setTimeout(onClose, 1400);
  };
  const mailto = () => {
    const subject = `[10x Loop] ${user && user.name || "Reviewer"} · ${currentScreen}`;
    const body = `Screen: ${currentScreen}\nStage: ${currentStage || "—"}\nSentiment: ${sentiment || "—"}\n\n${note}`;
    window.location.href = `mailto:${CONFIG.feedbackEmail}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
  };
  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal fade-up" onClick={e => e.stopPropagation()} style={{maxWidth: 440}}>
        {sent ? (
          <div className="text-center py-6">
            <p className="text-5xl">✅</p>
            <p className="head text-2xl font-bold mt-3">Saved.</p>
            <p className="muted text-sm mt-1">Anuj will see this.</p>
          </div>
        ) : (
          <div>
            <h2 className="head text-2xl font-bold">What stood out — or didn't?</h2>
            <p className="muted text-xs mt-1">You're on: <b>{currentScreen}</b>{currentStage ? ` · ${currentStage}` : ""}</p>
            <div className="flex gap-2 mt-4 flex-wrap">
              {[["love", "💚 Loved it"], ["meh", "🤔 Meh"], ["confusing", "😕 Confusing"], ["broken", "🐞 Broken"]].map(([k, v]) => (
                <button key={k} className={`chip text-xs ${sentiment === k ? "active" : ""}`} onClick={() => setSentiment(k)}>{v}</button>
              ))}
            </div>
            <textarea rows="4" className="mt-4" placeholder="Be specific and honest — it's gold." value={note} onChange={e => setNote(e.target.value)} />
            <div className="flex gap-2 mt-5 justify-end flex-wrap">
              <button onClick={onClose} className="btn-ghost text-sm">Cancel</button>
              <button onClick={mailto} className="btn-ghost text-sm" disabled={note.length < 3} style={{opacity: note.length >= 3 ? 1 : 0.4}}>Email it</button>
              <button onClick={submit} className="btn-accent text-sm" disabled={note.length < 3} style={{opacity: note.length >= 3 ? 1 : 0.4}}>Save →</button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
};

  useEffect(() => {
    let s = null;
    try { const raw = localStorage.getItem(STORAGE_KEY); if (raw) s = JSON.parse(raw); } catch (e) {}
    // Demo mode with no saved state: seed a rich sample session so it demos instantly
    if (!s && demo) {
      const now = new Date();
      const daysAgo = (n) => { const d = new Date(now); d.setDate(d.getDate() - n); return d.toISOString(); };
      s = {
        user: { name: "Aisha Verma", role: "Senior Marketing Manager" },
        goal: "Ship a weekly client digest in 30 min",
        when: "Morning, with coffee",
        score: 58, level: "practitioner", currentStage: "think",
        progress: {
          read: { completed: true, completedAt: daysAgo(9), practiceNote: "Summarised the Q3 client review deck — asked for decisions + owners only.", reflection: "It caught a dependency I'd skimmed past." },
          write: { completed: true, completedAt: daysAgo(6), practiceNote: "Had AI critique my client email instead of rewriting it. Kept my voice.", reflection: "Editor, not fraud — as long as I write the first draft." },
          draw: { completed: true, completedAt: daysAgo(3), practiceNote: "Turned the campaign timeline into a one-slide visual.", reflection: "The visual exposed a sequencing problem the text hid." },
          add: { completed: true, completedAt: daysAgo(1), practiceNote: "Ran a full AI-augmented workday. Meeting pre-briefs were the biggest win.", reflection: "Slide reviews got slower with AI — I trust my own eye more there." }
        },
        evaluations: { write: { text: "Critique this client email like a chief of staff — where is it unclear, too long, or burying the ask? For a CMO with 60 seconds. Under 100 words. Don't rewrite it.", result: { score: 8.5, wordCount: 33, strengths: ["You named the audience — the biggest tone lever.", "You set a constraint. That's spec-mindset — exactly right.", "You told it what NOT to do. Underused and powerful."], lifts: ["State the desired action. 'I want them to approve this' reframes the whole response."] }, evaluatedAt: daysAgo(6) } },
        feedbacks: [{ note: "The goal line at the top of each session keeps me honest — I stopped doing generic exercises.", sentiment: "love", screen: "practice", stage: "Add", user: "Aisha Verma", timestamp: daysAgo(1) }],
        activity: [
          { t: daysAgo(9), type: "setup_complete", detail: "score 58 · practitioner" },
          { t: daysAgo(9), type: "stage_completed", detail: "read" },
          { t: daysAgo(6), type: "eval_run", detail: "write: 8.5/10" },
          { t: daysAgo(6), type: "stage_completed", detail: "write" },
          { t: daysAgo(3), type: "stage_completed", detail: "draw" },
          { t: daysAgo(1), type: "stage_completed", detail: "add" },
          { t: daysAgo(0), type: "session_start", detail: "" }
        ]
      };
    }
    if (s) {
      if (s.user) setUser(s.user);
      if (s.goal) setGoal(s.goal);
      if (s.when) setWhen(s.when);
      if (s.score != null) setScore(s.score);
      if (s.level) setLevel(s.level);
      if (s.currentStage) setCurrentStage(s.currentStage);
      if (s.progress) setProgress(s.progress);
      if (s.evaluations) setEvaluations(s.evaluations);
      if (s.feedbacks) setFeedbacks(s.feedbacks);
      if (s.activity) setActivity(s.activity);
    }
    // real streak from activity days
    const days = [...new Set(((s && s.activity) || []).map(a => a.t.slice(0, 10)))].sort();
    let st = 0;
    const today = new Date(todayISO());
    for (let i = 0; ; i++) {
      const d = new Date(today); d.setDate(d.getDate() - i);
      const iso = d.toISOString().slice(0, 10);
      if (days.includes(iso)) st++;
      else if (i === 0) continue; // today not yet logged is fine
      else break;
    }
    setStreak(Math.max(st, days.length ? st : 0) + (days.includes(todayISO()) ? 0 : 0));
    if (s && s.user) setScreen("today"); else setScreen("welcome");
    setHydrated(true);
    setActivity(a => [...a, { t: new Date().toISOString(), type: "session_start", detail: "" }]);
  }, []);

  // Persist
  useEffect(() => {
    if (!hydrated) return;
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({ user, goal, when, score, level, currentStage, progress, evaluations, feedbacks, activity }));
    } catch (e) {}
  }, [hydrated, user, goal, when, score, level, currentStage, progress, evaluations, feedbacks, activity]);

  // Recompute streak whenever activity changes
  useEffect(() => {
    const days = [...new Set(activity.map(a => a.t.slice(0, 10)))].sort();
    let st = 0;
    for (let i = 0; ; i++) {
      const d = new Date(); d.setDate(d.getDate() - i);
      const iso = d.toISOString().slice(0, 10);
      if (days.includes(iso)) st++;
      else break;
    }
    setStreak(st);
  }, [activity]);

  const allDone = STAGES.every(s => progress[s.id] && progress[s.id].completed);
  useEffect(() => { if (hydrated && allDone && screen !== "certificate") setScreen("certificate"); }, [allDone, hydrated]);

  const handleSetupComplete = (v) => {
    setUser({ name: v.name, role: v.role });
    setGoal(v.goal);
    setWhen(v.when || null);
    setScore(v.score);
    const lvl = calcLevel(v.score);
    setLevel(lvl.id);
    setCurrentStage(recommendStage(v.score));
    log("setup_complete", `score ${v.score} · ${lvl.id} · goal: ${v.goal}`);
    setScreen("today");
  };

  const resetSession = () => {
    if (!confirm("Clear all your data and start fresh?")) return;
    localStorage.removeItem(STORAGE_KEY);
    window.location.href = window.location.pathname + (demo ? "?mode=demo" : "");
  };

  const stage = STAGES.find(s => s.id === currentStage);

  if (hydrated && isObserver()) {
    return (
      <div className="min-h-screen">
        <div className="brand-strip"/>
        <ObserverView state={{ user, goal, when, score, level, currentStage, progress, evaluations, feedbacks, activity, streak }} />
      </div>
    );
  }
  if (!hydrated) return <div/>;

  return (
    <NudgeCtx.Provider value={{ visible: demo && nudgesVisible }}>
    <div className="min-h-screen flex flex-col">
      <div className="brand-strip"/>
      {screen !== "welcome" && screen !== "setup" && (
        <Header screen={screen} setScreen={setScreen} demo={demo}
          nudgesVisible={nudgesVisible} toggleNudges={() => setNudgesVisible(v => !v)}
          userName={user && user.name} onReset={resetSession} />
      )}

      <div className="flex-1">
        {screen === "welcome" && <Welcome onStart={() => { log("setup_started"); setScreen("setup"); }} />}
        {screen === "setup" && <Setup onComplete={handleSetupComplete} />}
        {screen === "today" && (user || demo) && (
          <Today user={user} goal={goal} when={when} level={level} score={score}
            currentStage={currentStage || "read"} progress={progress} streak={streak}
            onStartPractice={() => { log("practice_opened", currentStage || "read"); if (!currentStage) setCurrentStage("read"); setScreen("practice"); }}
            onSeeJourney={() => setScreen("journey")} />
        )}
        {screen === "today" && !user && !demo && <Welcome onStart={() => { log("setup_started"); setScreen("setup"); }} />}
        {screen === "practice" && stage && (
          <Practice stage={stage} goal={goal}
            savedData={progress[stage.id]} savedEval={evaluations[stage.id]}
            onSave={(d) => setProgress(p => ({ ...p, [stage.id]: { ...(p[stage.id] || {}), ...d } }))}
            onSaveEval={(ev) => setEvaluations(e => ({ ...e, [stage.id]: ev }))}
            onComplete={() => {
              setProgress(p => ({ ...p, [stage.id]: { ...(p[stage.id] || {}), completed: true, completedAt: new Date().toISOString() } }));
              log("stage_completed", stage.id);
              const idx = STAGES.findIndex(s => s.id === stage.id);
              if (STAGES[idx + 1]) setCurrentStage(STAGES[idx + 1].id);
              setScreen("today");
            }}
            onBack={() => setScreen("today")} log={log} />
        )}
        {screen === "journey" && (
          <Journey progress={progress} currentStage={currentStage} score={score} level={level} goal={goal} activity={activity}
            onPick={(id) => { setCurrentStage(id); log("practice_opened", id); setScreen("practice"); }} />
        )}
        {screen === "certificate" && (
          <Certificate score={score} level={LEVELS.find(l => l.id === level)} userName={user && user.name}
            onRestart={() => { setProgress({}); setCurrentStage("read"); setScreen("today"); }} />
        )}
        {demo && screen === "enterprise" && <EnterpriseDashboard />}
        {demo && screen === "nudgelab" && <NudgeLab enabled={nudgesVisible} toggle={() => setNudgesVisible(v => !v)} />}
      </div>

      {screen !== "welcome" && screen !== "setup" && (
        <FeedbackButton onClick={() => setShowFeedback(true)} />
      )}
      {showFeedback && (
        <FeedbackModal user={user} currentScreen={screen} currentStage={stage && stage.name}
          onSave={(p) => { setFeedbacks(f => [...f, p]); log("feedback", p.sentiment || ""); }}
          onClose={() => setShowFeedback(false)} />
      )}

      <footer className="text-xs muted text-center py-8 border-t mt-12" style={{borderColor: "var(--line)"}}>
        <p>10x Loop · an AI&amp;Beyond concept pilot · v0.4</p>
      </footer>
    </div>
    </NudgeCtx.Provider>
  );
};

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
